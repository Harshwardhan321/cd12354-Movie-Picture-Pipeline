name: Backend Continuous Deployment

on:
  push:
    branches: [main]
    paths:
      - "starter/backend/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: starter/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t backend:${{ github.sha }} .

      - name: Tag Image
        run: |
          docker tag backend:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }}

      - name: Push Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name cluster --region us-east-1

      - name: Deploy
        run: |
          cd k8s
          kustomize edit set image backend=${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }}
          kustomize build | kubectl apply -f -