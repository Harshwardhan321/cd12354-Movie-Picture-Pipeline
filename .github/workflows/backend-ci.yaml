name: Backend Continuous Integration

on:
push:
branches: [ main ]

workflow_dispatch:

jobs:
lint:
runs-on: ubuntu-latest
defaults:
run:
working-directory: starter/backend
steps:
- name: Checkout code
uses: actions/checkout@v4

```
  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install dependencies
    run: |
      pip install pipenv
      pipenv install

  - name: Run lint
    run: pipenv run lint
```

test:
runs-on: ubuntu-latest
defaults:
run:
working-directory: starter/backend
steps:
- name: Checkout code
uses: actions/checkout@v4

```
  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install dependencies
    run: |
      pip install pipenv
      pipenv install

  - name: Run tests
    run: pipenv run test
```

build:
runs-on: ubuntu-latest
needs: [lint, test]
defaults:
run:
working-directory: starter/backend
steps:
- name: Checkout code
uses: actions/checkout@v4

```
  - name: Build Docker image
    run: docker build -t mp-backend .
```
